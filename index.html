<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>認証中...</title>
</head>
<body>
  <h2>認証が完了しました！</h2>
  <p>このウィンドウは自動で閉じます。元のページに戻ってください。</p>

  <script>
    // 親ウィンドウがあればメッセージを送る（オプション）
    if (window.opener) {
      window.opener.postMessage({ type: 'discord_auth_complete' }, '*');
    }
    // すぐに閉じる
    setTimeout(() => {
      window.close();
    }, 1500);  // 1.5秒後に閉じる（ユーザーが読める時間）
  </script>
</body>
</html>
